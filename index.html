<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FFIT Treino</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

.header {
  background: #111;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: red;
}

.container {
  padding: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

button {
  background: red;
  border: none;
  color: white;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  font-weight: bold;
}

.serie {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.done {
  text-decoration: line-through;
  color: #777;
}

video {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">FFIT TREINO</div>

<div class="container">

<div class="card">
<h3 id="nome"></h3>
<video id="video" autoplay loop muted></video>

<div id="series"></div>

<button onclick="proximo()">Próximo exercício</button>

<p id="timer"></p>
</div>

</div>

<script>

let exercicios = [
  {nome:"AGACHAMENTO LIVRE",video:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"},
  {nome:"LEG PRESS 45",video:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"}
];

let atual = 0;

function carregar(){
  document.getElementById("nome").innerText = exercicios[atual].nome;
  document.getElementById("video").src = exercicios[atual].video;

  let div = document.getElementById("series");
  div.innerHTML = "";

  for(let i=1;i<=3;i++){
    let s = document.createElement("div");
    s.className = "serie";

    let txt = document.createElement("span");
    txt.innerText = "Série " + i;

    let btn = document.createElement("button");
    btn.innerText = "✔";

    btn.onclick = ()=>{
      txt.classList.add("done");
      iniciarTimer();
    };

    s.appendChild(txt);
    s.appendChild(btn);
    div.appendChild(s);
  }
}

function iniciarTimer(){
  let tempo = 60;
  let i = setInterval(()=>{
    document.getElementById("timer").innerText = "Descanso: " + tempo;
    tempo--;
    if(tempo < 0){
      clearInterval(i);
    }
  },1000);
}

function proximo(){
  atual++;
  if(atual >= exercicios.length){
    alert("Treino finalizado 🔥");
    atual = 0;
  }
  carregar();
}

carregar();

</script>

</body>
</html>

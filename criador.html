<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FFIT Treino</title>

<style>
body { font-family: Arial; text-align: center; }
textarea { width: 90%; height: 120px; }
button { background:red; color:white; padding:10px; border:none; margin:5px; }
.card { background:#f5f5f5; padding:15px; border-radius:10px; width:320px; margin:auto; }
</style>
</head>

<body>

<h1>FFIT Treino</h1>

<div class="card">

<h3>👨‍🏫 Criar treino</h3>

<textarea id="treinoInput">
AGACHAMENTO|3|10|https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4
LEG PRESS|3|12|https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4
</textarea>

<br>

<button onclick="gerarLink()">Gerar link do aluno</button>

<p id="linkGerado"></p>

</div>

<hr>

<div class="card">

<h3>💪 Treino do aluno</h3>

<div id="treino"></div>

</div>

<script>

function gerarLink() {
  let texto = document.getElementById("treinoInput").value;
  let encoded = encodeURIComponent(texto);

  let link = window.location.origin + window.location.pathname + "?treino=" + encoded;

  document.getElementById("linkGerado").innerHTML =
    `<a href="${link}" target="_blank">${link}</a>`;
}

function carregarTreino() {
  let params = new URLSearchParams(window.location.search);
  let treino = params.get("treino");

  if (!treino) return;

  treino = decodeURIComponent(treino);

  let lista = treino.split("\n");

  let container = document.getElementById("treino");

  lista.forEach(item => {
    let [nome, series, reps, video] = item.split("|");

    let div = document.createElement("div");

    div.innerHTML = `
      <p><b>${nome}</b></p>
      <video width="200" autoplay loop muted src="${video}"></video>
      <p>${series} séries de ${reps}</p>
      <hr>
    `;

    container.appendChild(div);
  });
}

carregarTreino();

</script>

</body>
</html>
